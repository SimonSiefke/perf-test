name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  performance-tools:
    name: Performance tools
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install performance tools
        run: |
          sudo apt-get update
          sudo apt-get install -y linux-tools-common linux-tools-generic strace
          sudo apt-get install -y "linux-tools-$(uname -r)" || sudo apt-get install -y linux-tools-azure || true

      - name: Enable perf events
        run: |
          set -euo pipefail

          echo "Kernel: $(uname -r)"
          echo "Before: kernel.perf_event_paranoid=$(cat /proc/sys/kernel/perf_event_paranoid)"
          sudo sysctl -w kernel.perf_event_paranoid=-1
          echo "After: kernel.perf_event_paranoid=$(cat /proc/sys/kernel/perf_event_paranoid)"

      - name: Run perf counter smoke test
        run: |
          set -euo pipefail

          perf_bin="$(command -v perf || true)"
          if [ -z "$perf_bin" ] || ! "$perf_bin" --version; then
            perf_bin="$(find /usr/lib/linux-tools -type f -name perf 2>/dev/null | sort -V | tail -n 1 || true)"
          fi

          if [ -z "$perf_bin" ]; then
            echo "::warning::No perf binary is available on this runner."
            exit 0
          fi

          "$perf_bin" --version

          workload=(
            python3
            -c
            'total = sum((i % 97) * (i % 89) for i in range(1000000)); print(total)'
          )

          "$perf_bin" stat \
            -x, \
            -e cycles,instructions,task-clock,context-switches,cpu-migrations,page-faults \
            -o perf-stat.csv \
            -- "${workload[@]}"

          cat perf-stat.csv

          awk -F, '
            BEGIN {
              required["cycles"] = 1
              required["instructions"] = 1
            }
            $3 in required {
              value = $1
              gsub(/^[[:space:]]+|[[:space:]]+$/, "", value)
              if (value !~ /^[0-9]+$/ || value == "0") {
                printf "::error::%s was not counted: %s\n", $3, $0
                exit 1
              }
              counts[$3] = value + 0
              seen[$3] = 1
            }
            END {
              for (event in required) {
                if (!(event in seen)) {
                  printf "::error::Missing perf event: %s\n", event
                  exit 1
                }
              }
              printf "Perf hardware counters: instructions=%.0f cycles=%.0f IPC=%.3f\n", counts["instructions"], counts["cycles"], counts["instructions"] / counts["cycles"]
            }
          ' perf-stat.csv

      - name: Run strace smoke test
        run: |
          set -euo pipefail

          strace -qq -f -o strace.log -- sleep 0.1
          test -s strace.log
          head -n 20 strace.log
